name: Docker publish
permissions:
  contents: read
# Publishing only ever happens for the canonical history: pushes to master and
# version tags. Pull requests and feature branches never build or push an image.
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true
jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Setup NODE
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Set up JDK for compilation
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      - name: Build the spring app
        shell: bash
        run: mvn -B clean install -P production -Dmaven.test.skip=true
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: nroduit/karnak
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: src/main/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max